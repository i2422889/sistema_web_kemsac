<!doctype html>
<html lang="es">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Reserva - KEMSAC</title>
		<link rel="stylesheet" href="css/reserva.css" />
	
	</head>
	<body>
		<main class="reserve-page">
			<header class="reserve-header">
				<h1>Reserva tu servicio o repuesto</h1>
				<p class="lead">Rellena el formulario y te confirmaremos la disponibilidad.</p>
			</header>

			<section class="reserve-container">
				<form id="reserveForm" class="reserve-form" novalidate>
					<div class="form-row">
						<label for="name">Nombre completo</label>
						<input id="name" name="name" type="text" required placeholder="Ej. Juan Pérez" />
					</div>

					<div class="form-row">
						<label for="phone">Teléfono</label>
						<input id="phone" name="phone" type="tel" required placeholder="Ej. 987654321" />
					</div>

					<div class="form-row">
						<label for="email">Correo electrónico</label>
						<input id="email" name="email" type="email" placeholder="Opcional" />
					</div>

					<div class="form-row grid-2">
						<div>
							<label for="date">Fecha</label>
							<input id="date" name="date" type="date" required />
						</div>
						<div>
							<label for="time">Hora</label>
							<input id="time" name="time" type="time" required />
						</div>
					</div>

					<div class="form-row">
						<label for="product">Producto / Servicio</label>
						<select id="product" name="product" required>
							<option value="">-- Selecciona --</option>
							<option value="freno">Repuesto: Freno</option>
							<option value="aceite">Repuesto: Aceite</option>
							<option value="mantenimiento">Servicio: Mantenimiento</option>
							<option value="diagnostico">Servicio: Diagnóstico</option>
						</select>
					</div>

					<div class="form-row">
						<label for="quantity">Cantidad</label>
						<input id="quantity" name="quantity" type="number" min="1" value="1" />
					</div>

					<div class="form-row">
						<label for="notes">Notas</label>
						<textarea id="notes" name="notes" rows="3" placeholder="Información adicional (vehículo, modelo, etc.)"></textarea>
					</div>

					<div class="form-row actions">
						<button type="submit" class="btn primary">Reservar</button>
						<button type="button" id="clearBtn" class="btn ghost">Limpiar</button>
					</div>
				</form>

				<aside id="reserveStatus" class="reserve-status" aria-live="polite"></aside>
			</section>
		</main>

		<script src="js/reserva.js"></script>
	</body>
</html>
