<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>KEMSAC - Login Admin</title>
    <link rel="stylesheet" href="css/loginadmin.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="icon-lock">🔒</div>
            <h1>Panel de Administración</h1>
            <p>KEMSAC - Huancayo</p>
            
            <form id="formLogin">
                <div class="input-box">
                    <label>Usuario</label>
                    <input type="text" id="userInput" placeholder="Ingrese su usuario" required>
                </div>
                <div class="input-box">
                    <label>Contraseña</label>
                    <input type="password" id="passInput" placeholder="Ingrese su contraseña" required>
                </div>
                <button type="submit" id="btnLogin">Iniciar Sesión</button>
            </form>
            <div class="demo-info">Demo: admin / admin123</div>
        </div>
    </div>
    <script src="js/loginadmin.js"></script>
</body>
</html>
