<!doctype html>
<html lang="es">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Chatbot - KEMSAC</title>
		<link rel="stylesheet" href="css/chatbot.css">
	</head>
	<body>
		<div class="chat-toggle">
			<button class="chat-btn" id="chatToggle" aria-label="Abrir chat">💬</button>
		</div>

		<aside class="chat-window" id="chatWindow" role="dialog" aria-label="Asistente de ayuda">
			<div class="chat-header">
				<h3>Asistente KEMSAC</h3>
				<div class="chat-header-actions">
					<button id="minimizeBtn" title="Minimizar" class="icon">—</button>
					<button id="closeBtn" title="Cerrar" class="icon">✕</button>
				</div>
			</div>
			<div class="chat-body" id="chatBody">
				<div class="small">Hola — escribe tu pregunta. Ejemplos: "¿Horario?", "precio de freno"</div>
				<div class="messages" id="messages" aria-live="polite"></div>
			</div>
			<form class="chat-footer" id="chatForm" onsubmit="return false;">
				<input id="chatInput" class="chat-input" type="text" placeholder="Escribe un mensaje..." aria-label="Mensaje" autocomplete="off" />
				<button id="sendBtn" class="send-btn" aria-label="Enviar">Enviar</button>
			</form>
		</aside>

		<script src="js/chatbot.js" defer></script>
	</body>
</html>
